name: Release

# Only runs when you push a version tag, e.g.:
#   git tag v0.2.0
#   git push origin v0.2.0
# Regular commits/pushes to branches do NOT trigger this.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
          - platform: macos-latest
            bundles: dmg,app
          - platform: ubuntu-latest
            bundles: appimage,rpm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build and bundle app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Overrides tauri.conf.json's "targets" for this platform only —
          # local tauri.conf.json can stay locked to ["nsis"] for your
          # Windows-only local testing without affecting this workflow.
          args: --bundles ${{ matrix.bundles }}
          tagName: ${{ github.ref_name }}
          releaseName: "ryamp ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
